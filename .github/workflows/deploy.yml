name: Build and Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # BUILD FRONTEND
      - name: Install and Build Frontend
        working-directory: ./frontend
        run: |
          npm install
          npm run build

      # DEPLOY TO VPS
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            mkdir -p /var/www/portal-csr/backend
            mkdir -p /var/www/portal-csr/frontend

      - name: Copy Backend to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "backend"
          target: "/var/www/portal-csr"
          strip_components: 0

      - name: Copy Frontend Dist to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "frontend/dist/*"
          target: "/var/www/portal-csr/frontend/dist"
          strip_components: 2

      - name: Post-Deployment Steps
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Tampilkan struktur folder untuk debug jika error lagi
            echo "--- Struktur Folder Final ---"
            ls -R /var/www/portal-csr
            
            cd /var/www/portal-csr/backend
            npm install --production
            
            # Buat file .env jika belum ada (Bapak perlu isi manual atau lewat secret)
            if [ ! -f .env ]; then
              echo "PORT=5001" > .env
              echo "DB_HOST=127.0.0.1" >> .env
              echo "DB_USER=${{ secrets.DB_USER }}" >> .env
              echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
              echo "DB_NAME=portal_csr" >> .env
            fi
            
            # Restart or Start with PM2
            pm2 delete portal-csr-backend || true
            pm2 start server.js --name "portal-csr-backend"
            pm2 save
            
            # Selesaikan Izin Akses untuk Nginx (Paling Penting untuk Error 500)
            sudo chown -R www-data:www-data /var/www/portal-csr
            sudo chmod -R 755 /var/www/portal-csr
